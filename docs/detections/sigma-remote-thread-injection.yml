---
title: Remote Thread Injection via CreateRemoteThread
id: 3a8c1f5e-9d2b-4e7a-8c3f-1b6e5a9d4c87
status: experimental
description: >
    Detects CreateRemoteThread injection, the technique used by StyxLoaderX Simple mode.
    Sysmon Event ID 8 (CreateRemoteThread) is logged when one process creates a thread
    in another. This rule flags suspicious target processes commonly abused for injection.
references:
    - https://attack.mitre.org/techniques/T1055/001/
    - https://github.com/frangelbarrera/StyxLoaderX-EDR-Evasion/blob/main/src/MainLoader.cpp
author: Frangel Barrera
date: 2026/06/30
modified: 2026/06/30
tags:
    - attack.t1055.001
    - attack.t1055
    - attack.defense_evasion
    - attack.privilege_escalation
logsource:
    product: windows
    service: sysmon
detection:
    selection_eventid:
        EventID: 8
    selection_target:
        TargetImage|endswith:
            - '\notepad.exe'
            - '\explorer.exe'
            - '\svchost.exe'
            - '\calc.exe'
            - '\mshta.exe'
            - '\rundll32.exe'
            - '\regsvr32.exe'
    filter_legitimate:
        SourceImage|startswith:
            - 'C:\\Windows\\System32\\'
            - 'C:\\Windows\\SysWOW64\\'
    condition: selection_eventid and selection_target and not filter_legitimate
falsepositives:
    - Legitimate remote thread creation by system processes
    - Antivirus engines injecting into user processes
level: high
