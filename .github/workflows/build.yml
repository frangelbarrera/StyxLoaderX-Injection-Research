name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Install OpenSSL
        run: vcpkg install openssl:x64-windows

      - name: Configure
        run: cmake -B build -S . -DCMAKE_PREFIX_PATH=C:/vcpkg/installed/x64-windows

      - name: Build
        run: cmake --build build --config Release

      - name: Verify
        run: |
          Test-Path build/Release/main_loader.exe
          Test-Path build/Release/simple_injector_tool.exe
          Test-Path build/shellcode.bin

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: binaries
          path: |
            build/Release/*.exe
            build/Release/*.dll
            build/shellcode.bin
